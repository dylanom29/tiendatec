<script>
    // ESTA ES TU CONTRASEÑA. Cambia "1234" por la que tú quieras.
    const CLAVE = "1234"; 
    const acceso = prompt("Panel de Control TECHNNEN\nIntroduce la clave:");
    if (acceso !== CLAVE) {
        alert("Acceso denegado.");
        window.location.href = "index.html";
    }
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - TECHNNEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-2xl mb-6 shadow-lg">
            <h1 class="text-2xl font-black italic">TECHNNEN <span class="text-blue-300 text-sm">ADMIN</span></h1>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
            <form id="form-p" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="n" placeholder="Producto" class="p-3 border rounded-xl" required>
                <input type="number" id="p" placeholder="Precio $" class="p-3 border rounded-xl" required>
                <input type="number" id="s" placeholder="Stock" class="p-3 border rounded-xl" required>
                <input type="url" id="u" placeholder="Link de Foto (URL)" class="p-3 border rounded-xl" required>
                <button class="md:col-span-2 bg-blue-600 text-white p-4 rounded-xl font-bold">GUARDAR PRODUCTO</button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-xs font-bold text-slate-400">
                    <tr><th class="p-4">FOTO</th><th class="p-4">NOMBRE</th><th class="p-4 text-center">STOCK</th><th class="p-4">PRECIO</th><th class="p-4 text-center">ACCION</th></tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-v0_pepsYcFTrVisGPx1a0_OxWSu9SbU",
            authDomain: "tiendatec-4307f.firebaseapp.com",
            projectId: "tiendatec-4307f",
            storageBucket: "tiendatec-4307f.firebasestorage.app",
            messagingSenderId: "810142772386",
            appId: "1:810142772386:web:2fb664275b1e76b3d23bfb"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('form-p').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "productos"), {
                nombre: document.getElementById('n').value,
                precio: parseFloat(document.getElementById('p').value),
                stock: parseInt(document.getElementById('s').value),
                urlImagen: document.getElementById('u').value,
                fecha: new Date()
            });
            e.target.reset();
        });

        onSnapshot(query(collection(db, "productos"), orderBy("fecha", "desc")), (snap) => {
            const l = document.getElementById('lista'); l.innerHTML = "";
            snap.forEach(d => {
                const i = d.data();
                l.innerHTML += `<tr class="border-t"><td class="p-4"><img src="${i.urlImagen}" class="w-10 h-10 object-cover rounded-lg"></td><td class="p-4 font-bold">${i.nombre}</td><td class="p-4 text-center">${i.stock}</td><td class="p-4 font-bold text-blue-600">$${i.precio}</td><td class="p-4 text-center"><button onclick="borrar('${d.id}')" class="text-red-400"><i class="fas fa-trash"></i></button></td></tr>`;
            });
        });
        window.borrar = (id) => confirm("¿Borrar?") && deleteDoc(doc(db, "productos", id));
    </script>
</body>
</html>
